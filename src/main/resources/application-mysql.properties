# MySQL database (production / Camunda-Lab)
# Credentials dürfen NICHT im Code oder Repository stehen.
# Setze die folgenden Umgebungsvariablen vor dem Start:
#   DB_URL      z.B. jdbc:mysql://192.168.111.4:3306/db_group2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#   DB_USERNAME z.B. group2
#   DB_PASSWORD (geheim, nicht hier eintragen)
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
